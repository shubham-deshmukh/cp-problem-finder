version: '3.3'

services:
    cp-problem-finder-backend:
        container_name: cp-problem-finder-backend
        build: .
        restart: always
        environment:
          # Tell FastAPI to talk to the internal Meilisearch container
          - MEILI_URL=http://meilisearch:7700
          - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
          - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
          - JWT_SECRET=${JWT_SECRET}
          - FRONTEND_URL=${FRONTEND_URL}
          - ADMIN_EMAILS=${ADMIN_EMAILS}
        depends_on:
          - meilisearch
        volumes:
          - ./data:/app/data
        networks:
          - default
          - proxy

    meilisearch:
        image: getmeili/meilisearch:v1.7
        restart: always
        environment:
          - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
        volumes:
         - ./meili_data:/meili_data

networks:
  proxy:
    external: true
